<div class="search-page">
  <div *ngIf="!results()" class="empty-state">
    <p>Search for a game to see results.</p>
  </div>

  <div *ngIf="results() && results().results?.length === 0" class="empty-state">
    <p>No results found.</p>
  </div>

  <div *ngIf="results()?.results?.length > 0" class="results-grid">
    <div class="game-card" *ngFor="let game of results().results"> <!--so here were gonna say where that-->
      <div class="game-image-wrapper">
        <img
          *ngIf="game.background_image"
          [src]="game.background_image"
          [alt]="game.name"
          class="game-image"
        />
        <div *ngIf="!game.background_image" class="no-image">No Image</div>
      </div>

      <div class="game-info">
        <h2 class="game-name">{{ game.name }}</h2>

        <div class="game-rating">
          <span class="star">&#9733;</span>
          <span>{{ game.rating ? (game.rating | number: '1.1-1') : 'N/A' }}</span>
        </div>

        <div class="game-platforms">
          <span
            class="platform-tag"
            *ngFor="let p of game.platforms"
          >
            {{ p.platform.name }}
          </span>
          <span *ngIf="!game.platforms || game.platforms.length === 0" class="platform-tag muted">
            Unknown
          </span>
        </div>

        <div class="game-actions">
          <button type="button" class="game-btn learn-more-btn" (click)="learnMore(game.id)">Learn More</button>
          <span
            class="add-list-wrap"
            [class.add-list-wrap--locked]="!isAuthenticated()"
            (click)="!isAuthenticated() && $event.preventDefault()"
          >
            <button
              type="button"
              class="game-btn add-list-btn"
              [disabled]="!isAuthenticated()"
              (click)="chooseList(game.id)"
            >
              Add to List
            </button>
          </span>
        </div>
      </div>
    </div>
  </div>
</div>
