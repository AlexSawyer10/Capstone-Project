<nav>
  <div class="nav-left">
    <button class="auth-btn" (click)="transferToHome()">Home</button>
    <button class="auth-btn" (click)="transferToTopLists()">Top Lists</button>
    <button class="auth-btn" (click)="transferToWorstLists()">Worst Lists</button>
  </div>
  <form (ngSubmit)="transferSearchInput(searchInput.value)">
  <div class="search-wrapper" (focusin)="isSearchOpen.set(true)" (focusout)="handleSearchFocusOut($event)">
    <div class="search-container">
      <span class="search-icon" aria-hidden="true">&#128269;</span>
      <input #searchInput type="text" placeholder="Search" aria-label="Search" required />
      <button
        type="button"
        class="clear-search-btn"
        (click)="searchInput.value = ''; searchInput.focus()"
        aria-label="Clear search"
      >
        &times;
      </button>
    </div>

    @if (isSearchOpen())
    {
      <button type="submit" class="search-dropdown-item" aria-label="Search for games">
        🎮 Search for games
      </button>
      <button type="button" class="search-dropdown-item" aria-label="Search for lists" (click)="transferListSearch(searchInput.value)">
        📋 Search for lists
      </button>
      <button type="button" class="search-dropdown-item" aria-label="Search for profiles" (click)="transferProfileSearch(searchInput.value)">
        👤 Search for profiles
      </button>
    }
  </div>
  </form>

  @if (isLoading())
  {
    <span>Loading...</span>
  }
  @else
  {
    <div class="auth-group">
      <span
        class="create-list-wrap"
        [class.create-list-wrap--locked]="!isAuthenticated()"
        (click)="!isAuthenticated() && $event.preventDefault()"
      >
        <button
          type="button"
          class="auth-btn create-list-btn"
          [disabled]="!isAuthenticated()"
          (click)="transferToCreateList()"
        >
          Create List
        </button>
      </span>

      @if (isAuthenticated())
      {
        <button class="auth-btn" (click)="transferToLoggedProfile()">Profile</button>
        <button class="auth-btn" (click)="auth.logout({ logoutParams: { returnTo: window.location.origin } })">Logout</button>
      }
      @else
      {
        <span
          class="create-list-wrap"
          [class.create-list-wrap--locked]="!isAuthenticated()"
          (click)="!isAuthenticated() && $event.preventDefault()"
        >
          <button
            type="button"
            class="auth-btn create-list-btn"
            [disabled]="!isAuthenticated()"
          >
            Profile
          </button>
        </span>
        <button class="auth-btn" (click)="auth.loginWithRedirect()">Login</button>
      }
    </div>
  }
</nav>
