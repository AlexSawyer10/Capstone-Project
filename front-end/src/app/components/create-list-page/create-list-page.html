<div class="create-list-page">
  <div class="form-card">
    <h1 class="page-title">Create a List</h1>
    <p class="page-subtitle">Organize your games into a shareable collection.</p>

    <form (ngSubmit)="onSubmit()" novalidate>

      <div class="field-group">
        <label class="field-label" for="listName">
          List Name <span class="required">*</span>
        </label>
        <input
          id="listName"
          type="text"
          class="field-input"
          placeholder="e.g. Best RPGs of All Time"
          [value]="listName()"
          (input)="listName.set($any($event.target).value)"
          maxlength="80"
        />
        <div class="field-meta">
          <span class="field-error" *ngIf="listName().trim().length === 0">
            List name is required.
          </span>
          <span class="char-count" [class.near-limit]="listName().length >= 70">
            {{ listName().length }}/80
          </span>
        </div>
      </div>

      <div class="field-group">
        <label class="field-label" for="listDescription">
          Description <span class="required">*</span>
        </label>
        <textarea
          id="listDescription"
          class="field-input field-textarea"
          placeholder="What's this list about?"
          [value]="listDescription()"
          (input)="listDescription.set($any($event.target).value)"
          maxlength="500"
          rows="4"
        ></textarea>
        <div class="field-meta">
          <span class="field-error" *ngIf="listDescription().trim().length === 0">
            Description is required.
          </span>
          <span class="char-count" [class.near-limit]="listDescription().length >= 450">
            {{ listDescription().length }}/500
          </span>
        </div>
      </div>

      <div class="field-group">
        <label class="field-label">
          Cover Image <span class="optional">(optional)</span>
        </label>

        <div class="image-upload-area" *ngIf="!imagePreview()">
          <label for="listImage" class="image-upload-label">
            <span class="upload-icon">&#128247;</span>
            <span class="upload-text">Click to upload an image</span>
            <span class="upload-hint">PNG, JPG, WEBP — max 5MB</span>
          </label>
          <input
            id="listImage"
            type="file"
            accept="image/png, image/jpeg, image/webp"
            class="file-input"
            (change)="onImageSelected($event)"
          />
        </div>

        <div class="image-preview-wrap" *ngIf="imagePreview()">
          <img [src]="imagePreview()" alt="Cover preview" class="image-preview" />
          <button type="button" class="remove-image-btn" (click)="removeImage()">
            &times; Remove
          </button>
        </div>
      </div>

      <div class="field-group">
        <label class="field-label" for="visibility">Visibility</label>
        <div class="select-wrap">
          <select
            id="visibility"
            class="field-input field-select"
            [value]="isPublic() ? 'public' : 'private'"
            (change)="isPublic.set($any($event.target).value === 'public')"
          >
            <option value="public">&#127758; Public — anyone can see this list</option>
            <option value="private">&#128274; Private — only you can see this list</option>
          </select>
        </div>
      </div>

      <div class="form-message success-message" *ngIf="successMessage()">
        &#10003; {{ successMessage() }}
      </div>

      <div class="form-message error-message" *ngIf="errorMessage()">
        &#10007; {{ errorMessage() }}
      </div>

      <div class="form-actions">
        <button
          type="submit"
          class="submit-btn"
          [disabled]="!isFormValid()"
        >
          Create List
        </button>
      </div>

    </form>
  </div>
</div>
